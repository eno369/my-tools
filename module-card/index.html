<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モジュールカード</title>
  <!-- html2canvas は PNG保存時に動的ロード -->
  <style>
    :root {
      --primary: #0277bd;
      --primary-dark: #01579b;
      --primary-light: #29b6f6;
      --bg: #f0f9ff;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #bae6fd;
      --tag-bg: #e0f2fe;
      --tag-text: #0369a1;
      --input-bg: #f8fafc;
      --shadow: rgba(0,0,0,0.10);
      --theme-btn-bg: #e0f2fe;
    }

    html[data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #334155;
      --tag-bg: #164e63;
      --tag-text: #38bdf8;
      --input-bg: #0f172a;
      --shadow: rgba(0,0,0,0.40);
      --theme-btn-bg: #1e3a4a;
    }

    /* SVGパズル：ダークモード */
    html[data-theme="dark"] #pz-body { fill: #0c3d52; stroke: #38bdf8; }
    html[data-theme="dark"] #card-export svg text { fill: #7dd3fc; }
    html[data-theme="dark"] #card-export svg line { stroke: #7dd3fc; }
    html[data-theme="dark"] #card-export svg polygon { fill: #7dd3fc; }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    input, textarea {
      color: var(--text);
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .screen {
      display: none;
    }

    .app-wrap {
      max-width: 400px;
      margin: 0 auto;
      padding: 16px 16px 80px;
    }

    /* プレビュー画面 — 要素グリッド */
    .elements-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .el { border-radius:8px; overflow:hidden; border:1px solid var(--border); }
    .el-h { padding:5px 8px; font-size:12px; font-weight:bold; background:#0277bd; color:white; }
    .el-d { padding:2px 7px; font-size:11px; line-height:1.3; background:var(--tag-bg); color:var(--tag-text); }
    .el-c { padding:6px 8px; font-size:12px; min-height:40px; line-height:1.5; color:var(--text); }
    .calling .el-h { background:#01579b; }
    .ku .el-h { background:#0288d1; }

    /* テーマ切替ボタン */
    :focus-visible {
      outline: 2px solid var(--primary-dark);
      outline-offset: 2px;
      border-radius: 2px;
    }

    #theme-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 200;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--theme-btn-bg);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px var(--shadow);
      transition: background 0.2s;
    }
  </style>
</head>
<body>

    const LS_KEY = 'module-card-v1';

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(LS_KEY)) || defaultState();
      } catch {
        return defaultState();
      }
    }

    function defaultState() {
      return {
        apiKey: '',
        mode: 'ai',
        profile: { name: '' },
        elements: {
          kaze:    { answers: [], summary: '' },
          tama:    { answers: [], summary: '' },
          hand:    { answers: [], summary: '' },
          core:    { answers: [], summary: '' },
          ku:      { answers: [], summary: '' },
          calling: { answers: [], summary: '' },
        }
      };
    }

    function saveState() {
      localStorage.setItem(LS_KEY, JSON.stringify(STATE));
    }

    // ─── スナップショット管理 ──────────────────────────────────────────
    const SNAPSHOTS_KEY = 'module-card-snapshots-v1';

    function loadSnapshots() {
      try {
        return JSON.parse(localStorage.getItem(SNAPSHOTS_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveSnapshot(name) {
      const snapshots = loadSnapshots();
      const now = new Date();
      const date = `${now.getFullYear()}-${padTwo(now.getMonth()+1)}-${padTwo(now.getDate())}`;
      const snap = {
        id: 'snap-' + now.getTime(),
        name: name,
        date: date,
        profile: { name: STATE.profile.name },
        elements: {}
      };
      ELEMENT_KEYS.forEach(key => {
        snap.elements[key] = { summary: STATE.elements[key].summary };
      });
      snapshots.push(snap);
      localStorage.setItem(SNAPSHOTS_KEY, JSON.stringify(snapshots));
    }

    function deleteSnapshot(id) {
      const snapshots = loadSnapshots().filter(s => s.id !== id);
      localStorage.setItem(SNAPSHOTS_KEY, JSON.stringify(snapshots));
    }

    function confirmDeleteSnapshot(id) {
      const snap = loadSnapshots().find(s => s.id === id);
      const name = snap ? snap.name : '';
      if (confirm(`「${name}」を削除しますか？`)) {
        deleteSnapshot(id);
        renderHistory();
      }
    }
    // ──────────────────────────────────────────────────────────────────

    let STATE = loadState();
    let QF = { key: null, index: 0 };

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function padTwo(n) { return String(n).padStart(2, '0'); }

    // ─── テーマ管理 ───────────────────────────────────────────────
    const THEME_KEY = 'module-card-theme';

    function loadTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem(THEME_KEY, theme);
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    // ページ読み込み直後にテーマ適用（チラつき防止）
    applyTheme(loadTheme());

    const SCREENS = ['setup-screen','main-screen','question-screen','preview-screen','history-screen'];

    function showScreen(id) {
      SCREENS.forEach(s => {

    function saveCurrentAnswer() {
      const textEl = document.getElementById('answer-text');

      const text = textEl.value || '';

      if (!STATE.elements[key].answers) STATE.elements[key].answers = [];
      STATE.elements[key].answers[index] = text;

      if (!STATE.elements[key].answers) STATE.elements[key].answers = [];
      STATE.elements[key].answers[index] = val;
      saveState();

    function skipQuestion() {
      saveCurrentAnswerAs('');
      advanceQuestion();
    }

    function nextQuestion() {
      saveCurrentAnswer();
      advanceQuestion();
    }

    function advanceQuestion() {
      const total = QUESTIONS[QF.key].length;
      if (QF.index < total - 1) {
        QF.index++;
        renderQuestion();
      } else {
        // 全問回答済み → 要約へ
        if (typeof summarizeAnswers === 'function') {
          summarizeAnswers(QF.key);
        }
      }
    }

    async function callGemini(prompt) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${STATE.apiKey}`;
      const body = {
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { maxOutputTokens: 100, temperature: 0.7 }
      };
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
    }

    function buildSummaryPrompt(key) {
      const meta = ELEMENT_META[key];
      const questions = QUESTIONS[key] || [];
      const answers = STATE.elements[key].answers || [];

      const pairs = questions
        .map((q, i) => ({ q, a: answers[i] || '' }))
        .filter(({ a }) => a.trim() !== '');

      if (pairs.length === 0) {
        return `あなたはパーソナリティ探求の専門家です。
「わたしの${meta.name}（${meta.tag}）」を一文（30字以内）で表してください。
回答が空でも、要素の性質から一般的な例を1つ作ってください。
一文のみ出力。余分な説明は不要です。`;
      }

      const qaText = pairs.map(({ q, a }) => `Q: ${q}\nA: ${a}`).join('\n\n');

      return `あなたはパーソナリティ探求の専門家です。
ユーザーが以下の質問に答えた内容を踏まえ、
「わたしの${meta.name}（${meta.tag}）」を
一文（30字以内）で表してください。

[質問と回答]
${qaText}

一文のみ出力してください。余分な説明は不要です。`;
    }

          </p>

          ${errorMsg ? `<div style="padding:12px; background:#fef2f2; border-radius:8px;
                                    color:#dc2626; font-size:12px; margin-bottom:16px;">
            ⚠️ API エラー: ${escapeHtml(errorMsg)}
          </div>` : ''}

          <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:6px;
                        color:var(--text);">
            一文で表すと（編集できます）
          </label>
          <textarea id="proposal-text" rows="3"
            style="width:100%; padding:12px; border:2px solid var(--primary-dark); border-radius:8px;
                   font-size:14px; resize:vertical; outline:none; background:var(--input-bg);
                   margin-bottom:12px;"
          >${proposed}</textarea>

          <button onclick="confirmSummary('calling')"
            style="width:100%; padding:12px; background:var(--primary-dark); color:white;
                   border:none; border-radius:8px; font-size:14px; font-weight:bold;
                   cursor:pointer;">
            確定してメインに戻る
          </button>
        </div>
      `;
    }

    // ─── 履歴画面 ──────────────────────────────────────────────────────
    function renderHistory() {
      const screen = document.getElementById('history-screen');
      const snapshots = loadSnapshots();

      screen.innerHTML = `
        <div class="app-wrap">
          <div style="display:flex; align-items:center; margin-bottom:20px; padding-top:8px;">
            <button onclick="showScreen('main-screen'); renderMain();"
              style="font-size:13px; color:var(--primary); background:none; border:none;
                     cursor:pointer; padding:0; margin-right:auto;">
              ← 戻る
            </button>
            <h1 style="font-size:17px; font-weight:bold; color:var(--primary-dark);">
              📋 履歴
            </h1>
          </div>

          ${snapshots.length === 0 ? `
            <div style="text-align:center; padding:60px 0; color:var(--text-muted);">
              <div style="font-size:48px; margin-bottom:16px;">📭</div>
              <p style="font-size:14px; margin-bottom:8px;">まだ保存されたスナップショットがありません</p>
              <p style="font-size:12px;">メイン画面の「📸 保存する」で記録できます</p>
            </div>
          ` : `
            <div style="display:flex; margin-bottom:16px; border:1px solid var(--border);
                        border-radius:8px; overflow:hidden;">
              <button id="tab-list" onclick="switchHistoryTab('list')"
                style="flex:1; padding:10px; font-size:13px; font-weight:bold;
                       border:none; cursor:pointer;
                       background:var(--primary); color:white;">
                一覧
              </button>
              <button id="tab-timeline" onclick="switchHistoryTab('timeline')"
                style="flex:1; padding:10px; font-size:13px; font-weight:bold;
                       border:none; cursor:pointer;
                       background:var(--card-bg); color:var(--text-muted);">
                タイムライン
              </button>
            </div>
            <div id="history-content">
              ${renderHistoryList(snapshots)}
            </div>
          `}
        </div>
      `;
    }

    function switchHistoryTab(tab) {
      const snapshots = loadSnapshots();
      document.getElementById('history-content').innerHTML =
        tab === 'list' ? renderHistoryList(snapshots) : renderHistoryTimeline(snapshots);
      const isList = tab === 'list';
      const tabList = document.getElementById('tab-list');
      const tabTL   = document.getElementById('tab-timeline');
      tabList.style.background = isList ? 'var(--primary)' : 'var(--card-bg)';
      tabList.style.color      = isList ? 'white' : 'var(--text-muted)';
      tabTL.style.background   = isList ? 'var(--card-bg)' : 'var(--primary)';
      tabTL.style.color        = isList ? 'var(--text-muted)' : 'white';
    }

    function renderHistoryList(snapshots) {
      const sorted = [...snapshots].reverse();
      return sorted.map(snap => `
        <div style="background:var(--card-bg); border:1px solid var(--border);
                    border-radius:12px; padding:14px; margin-bottom:10px;">
          <div style="display:flex; justify-content:space-between; align-items:flex-start;
                      margin-bottom:6px;">
            <div>
              <div style="font-size:14px; font-weight:bold; color:var(--text);">
                ${escapeHtml(snap.name)}
              </div>
              <div style="font-size:11px; color:var(--text-muted); margin-top:2px;">
                ${escapeHtml(snap.date)}
              </div>
            </div>
            <div style="display:flex; gap:6px; flex-shrink:0; margin-left:8px;">
              <button onclick="toggleSnapshotDetail('${snap.id}')"
                id="snap-btn-${snap.id}"
                style="font-size:12px; color:var(--primary); background:none;
                       border:1px solid var(--border); border-radius:6px;
                       padding:4px 10px; cursor:pointer;">
                見る
              </button>
              <button onclick="confirmDeleteSnapshot('${snap.id}')"
                style="font-size:12px; color:#ef4444; background:none;
                       border:1px solid #fca5a5; border-radius:6px;
                       padding:4px 8px; cursor:pointer;">
                ✕
              </button>
            </div>
          </div>
          ${snap.elements.calling && snap.elements.calling.summary ? `
            <div style="font-size:12px; color:var(--text-muted); font-style:italic;
                        border-top:1px solid var(--border); padding-top:8px; margin-top:6px;
                        line-height:1.5;">
              ✨ ${escapeHtml(snap.elements.calling.summary)}
            </div>
          ` : ''}
          <div id="snap-detail-${snap.id}" style="display:none; margin-top:12px;
               border-top:1px solid var(--border); padding-top:12px;">
            ${ELEMENT_KEYS.map(key => {
              const meta = ELEMENT_META[key];
              const summary = snap.elements[key] && snap.elements[key].summary;
              if (!summary) return '';
              return `
                <div style="margin-bottom:10px;">
                  <div style="font-size:11px; font-weight:bold; color:var(--primary-dark);">
                    ${meta.icon} ${meta.label}
                  </div>
                  <div style="font-size:13px; color:var(--text); margin-top:3px;
                              padding-left:4px; line-height:1.5;">
                    ${escapeHtml(summary)}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderHistoryTimeline(snapshots) {
      if (snapshots.length === 0) {
        return '<p style="text-align:center; color:var(--text-muted); padding:40px 0;">データがありません</p>';
      }
      const sorted = [...snapshots]; // 古い順（保存順）

      return ELEMENT_KEYS.map(key => {
        const meta    = ELEMENT_META[key];
        const entries = sorted.filter(s => s.elements[key] && s.elements[key].summary);
        if (entries.length === 0) return '';

        return `
          <div style="margin-bottom:24px;">
            <div style="font-size:14px; font-weight:bold; color:var(--primary-dark);
                        padding-bottom:8px; margin-bottom:12px;
                        border-bottom:2px solid var(--primary-light);">
              ${meta.icon} ${meta.label}
            </div>
            ${entries.map((snap, i) => {
              const isLast = i === entries.length - 1;
              return `
                <div style="display:flex; gap:12px; margin-bottom:${isLast ? '0' : '4px'};">
                  <div style="display:flex; flex-direction:column; align-items:center;
                              flex-shrink:0; padding-top:4px;">
                    <div style="width:10px; height:10px; border-radius:50%;
                                background:var(--primary); flex-shrink:0;"></div>
                    ${!isLast ? `
                      <div style="width:2px; flex:1; background:var(--border);
                                  min-height:20px; margin-top:2px;"></div>
                    ` : ''}
                  </div>
                  <div style="flex:1; padding-bottom:${isLast ? '0' : '12px'};">
                    <div style="font-size:11px; color:var(--text-muted); margin-bottom:2px;">
                      ${escapeHtml(snap.date)}
                      ${snap.name !== snap.date ? ` · <em>${escapeHtml(snap.name)}</em>` : ''}
                    </div>
                    <div style="font-size:13px; color:var(--text); line-height:1.5;">
                      ${escapeHtml(snap.elements[key].summary)}
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
    }

    function toggleSnapshotDetail(id) {
      const detail = document.getElementById('snap-detail-' + id);
      const btn    = document.getElementById('snap-btn-' + id);
      if (!detail) return;
      const isOpen = detail.style.display !== 'none';
      detail.style.display = isOpen ? 'none' : 'block';
      if (btn) btn.textContent = isOpen ? '見る' : '閉じる';
    }
    // ──────────────────────────────────────────────────────────────────

    function renderPreview() {
      const screen = document.getElementById('preview-screen');
      const name = STATE.profile.name || 'あなた';

      function gridCard(key, extraClass) {
        extraClass = extraClass || '';
        const meta = ELEMENT_META[key];
        const summary = STATE.elements[key].summary || '（未入力）';
        const tagShort = meta.tag.length > 20 ? meta.tag.substring(0, 20) + '…' : meta.tag;
        return `
          <div class="el ${extraClass}">
            <div class="el-h">${meta.icon} ${meta.label}</div>
            <div class="el-d">${tagShort}</div>
            <div class="el-c">${escapeHtml(summary)}</div>
          </div>`;
      }

      screen.innerHTML = `
        <div style="background:var(--bg); min-height:100vh; padding:16px;">

          <!-- ヘッダー -->
          <div style="display:flex; justify-content:space-between; align-items:center;
                      max-width:400px; margin:0 auto 12px;">
            <button onclick="showScreen('main-screen'); renderMain();"
              style="font-size:13px; color:var(--primary); background:none; border:none;
                     cursor:pointer; padding:0;">← 編集に戻る</button>
            <button onclick="downloadPNG()"
              style="padding:8px 16px; background:var(--primary); color:white; border:none;
                     border-radius:8px; font-size:13px; font-weight:bold; cursor:pointer;">
              📥 PNGで保存
            </button>
          </div>

          <!-- カード本体（キャプチャ対象） -->
          <div id="card-export"
            style="background:var(--card-bg); border-radius:20px; padding:20px 16px 24px;

                   box-shadow:0 4px 24px rgba(0,0,0,0.10);">

            <div style="text-align:center; font-size:14px; font-weight:bold;
                        letter-spacing:0.2em; margin-bottom:4px; color:var(--tag-text);">
              モジュールカード
            </div>
            <div style="text-align:center; font-size:10px; color:var(--text-muted); margin-bottom:14px;">
              @${escapeHtml(name)}
            </div>

            <!-- SVGパズルピース -->
            <div style="margin-bottom:16px;">
              <svg width="100%" viewBox="0 0 840 710" xmlns="http://www.w3.org/2000/svg"
                   role="img" aria-labelledby="puzzle-title">
                <title id="puzzle-title">モジュールカードの6要素図：風・玉・ハンド・コア・コーリング・空</title>
                <defs>
                  <marker id="pzarr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
                    <polygon points="0 0, 9 3.5, 0 7" fill="#054a4a"/>

                <path id="pz-body" fill="#cce9f0" stroke="#1a7878" stroke-width="2.5"
                  d="M 224 142
                     L 383 142
                     C 381 131, 375 109, 378 96
                     C 381 83, 397 75, 420 75
                     C 443 75, 459 83, 462 96
                     C 465 109, 459 131, 457 142
                     L 616 142 Q 628 142 628 154
                     L 628 322
                     C 638 320, 660 312, 669 318
                     C 678 324, 688 340, 688 357
                     C 688 374, 678 390, 669 396
                     C 660 402, 638 394, 628 392
                     L 628 560 Q 628 572 616 572
                     L 457 572
                     C 459 583, 465 605, 462 618
                     C 459 631, 443 639, 420 639
                     C 397 639, 381 631, 378 618
                     C 375 605, 381 583, 383 572
                     L 224 572 Q 212 572 212 560
                     L 212 392
                     C 220 390, 248 397, 258 391
                     C 268 385, 278 372, 278 357
                     C 278 342, 268 329, 258 323
                     C 248 317, 220 324, 212 322
                     L 212 154 Q 212 142 224 142
                     Z"/>

                <!-- コーリング（上半） -->
                <text x="420" y="308" text-anchor="middle" font-size="40" font-weight="bold"
                      fill="#054a4a" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">コーリング</text>
                <text x="420" y="345" text-anchor="middle" font-size="17"
                      fill="#054a4a" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">魂からの問い</text>
                <text x="420" y="365" text-anchor="middle" font-size="17"
                      fill="#054a4a" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">生涯かけて取り組む探求</text>

                <!-- コア（下半） -->
                <text x="420" y="455" text-anchor="middle" font-size="36" font-weight="bold"
                      fill="#054a4a" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">コア</text>
                <text x="420" y="488" text-anchor="middle" font-size="17"
                      fill="#054a4a" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">変わらない自分の本質</text>

                <!-- 風（上ノブ） -->
                <text x="420" y="37" text-anchor="middle" font-size="18"
                      fill="#054a4a" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">好きでたまらん</text>
                <text x="420" y="118" text-anchor="middle" font-size="38" font-weight="bold"
                      fill="#054a4a" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">風</text>
                <line x1="453" y1="106" x2="502" y2="86" stroke="#054a4a" stroke-width="1.3"/>
                <text x="507" y="75" font-size="15" fill="#054a4a"

                <text x="507" y="94" font-size="15" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">やりたい</text>
                <text x="507" y="113" font-size="15" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">生まれ持っての関心</text>

                <!-- 玉（右ノブ） -->

                <text x="651" y="366" text-anchor="middle" font-size="38" font-weight="bold"
                      fill="#054a4a" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">玉</text>
                <line x1="670" y1="357" x2="748" y2="336" stroke="#054a4a" stroke-width="1.3"/>
                <text x="753" y="326" font-size="15" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社会で磨いた</text>
                <text x="753" y="345" font-size="15" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">役割や技術</text>

                <!-- ハンド（下ノブ） -->
                <text x="420" y="584" writing-mode="vertical-rl" text-anchor="middle"

                <text x="517" y="588" font-size="15" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">他者に手を</text>
                <text x="517" y="607" font-size="15" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">差し伸べられる</text>
                <text x="517" y="626" font-size="15" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">スキル</text>
                <text x="420" y="690" text-anchor="middle" font-size="18"

                <!-- 空（左ノッチ＝凹み） -->
                <!-- 苦手ラベル：ノッチ上 -->
                <text x="196" y="320" text-anchor="end" font-size="14"
                      fill="#054a4a" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">苦手</text>
                <!-- 空ラベル：凹の中央 -->
                <text x="248" y="368" text-anchor="middle" font-size="32" font-weight="bold"
                      fill="#054a4a" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">空</text>

                <!-- 左端：縦書き説明（パズル左側に沿って配置） -->
                <text x="110" y="478" writing-mode="vertical-rl" font-size="16" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">接続できる</text>
                <text x="91" y="428" writing-mode="vertical-rl" font-size="16" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">モジュール同士が</text>
                <text x="72" y="410" writing-mode="vertical-rl" font-size="16" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">この空白があるから</text>
                <!-- 注釈テキスト（縦書きの下） -->
                <text x="72" y="585" font-size="13" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">他者が自己を</text>
                <text x="72" y="602" font-size="13" fill="#054a4a"
                      font-family="'Hiragino Sans','Noto Sans JP',sans-serif">表現する空間</text>
              </svg>
            </div>

            <!-- 要素グリッド（左列: 風・玉・ハンド、右列: コーリング・コア・空） -->
            <div class="elements-grid">
              ${gridCard('kaze')}
              ${gridCard('calling', 'calling')}
              ${gridCard('tama')}
              ${gridCard('core')}
              ${gridCard('hand')}
              ${gridCard('ku', 'ku')}
            </div>
          </div>

          <p style="text-align:center; font-size:11px; color:var(--text-muted);
                    margin-top:12px; max-width:400px; margin:12px auto 0;">
            ※ PNGで保存するとカード部分が画像でダウンロードされます
          </p>
        </div>
      `;
    }

    function loadHtml2Canvas() {
      return new Promise((resolve, reject) => {
        if (typeof html2canvas !== 'undefined') { resolve(); return; }
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('html2canvas の読み込みに失敗しました'));
        document.head.appendChild(s);
      });
    }

    async function downloadPNG() {
      const btn = document.querySelector('button[onclick="downloadPNG()"]');
      if (btn) { btn.textContent = '処理中…'; btn.disabled = true; }

      try {
        await loadHtml2Canvas();
        const target = document.getElementById('card-export');
        const canvas = await html2canvas(target, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
        });

        const link = document.createElement('a');
        const safeName = (STATE.profile.name || 'card').replace(/[^\w぀-鿿]/g, '_');
        link.download = `module-card-${safeName}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) {
        alert('PNG出力に失敗しました: ' + e.message);
      } finally {
        if (btn) { btn.textContent = '📥 PNGで保存'; btn.disabled = false; }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!STATE.apiKey && STATE.mode !== 'manual') {
        showScreen('setup-screen');
        renderSetup();
      } else {
        showScreen('main-screen');
        renderMain();
      }
    });
  </script>
</body>
